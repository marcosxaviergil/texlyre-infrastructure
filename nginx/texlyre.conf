server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets com cache agressivo
    location ~* \.(js|mjs|css|wasm|woff2|ttf|otf|png|svg|ico|json|bcmap|wav)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Health check
    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
        access_log off;
    }
}