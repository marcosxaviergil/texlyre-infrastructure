      echo "  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—     в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в•‘в–Ҳв–Ҳв•‘"
      echo "  в•ҡв•җв•җв•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•қ     в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в•‘в–Ҳв–Ҳв•‘"
      echo "  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—"
      echo "  в•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қ   в•ҡв•җв•қ   в•ҡв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қ "
      echo "               s e t i c              "
      echo "  SuperintendГӘncia de Tecnologia da InformaГ§ГЈo e ComunicaГ§ГЈo"
