  - deploy
  - cleanup

variables:
  DOCKER_BUILDKIT: "1"
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_SUBMODULE_FORCE_HTTPS: "true"

.docker_job: &docker_job
  image: registry.setic.ufsc.br/marcosxavier/docker-image/docker:stable
  before_script:
    - docker info

